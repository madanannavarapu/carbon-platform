services:
  - type: web
    name: carbon-platform
    runtime: node
    plan: free
    buildCommand: cd backend && NODE_ENV=development npm install && npx tsc && cd ../frontend && NODE_ENV=development npm install && npm run build
    startCommand: cd backend && node dist/server.js
    envVars:
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
