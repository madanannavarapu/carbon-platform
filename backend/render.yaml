services:
  - type: web
    name: carbon-platform-api
    runtime: node
    plan: free
    buildCommand: npm install && npx tsc
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
